name: Check and Update AUR Packages

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          {
            echo 'Host aur.archlinux.org'
            echo '    IdentityFile ~/.ssh/aur_key'
            echo '    User aur'
          } >> ~/.ssh/config

      - name: Scan and update packages
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          python3 << 'PYEOF'
          import os, re, subprocess, hashlib, tempfile, json, urllib.request

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(65536), b''):
                      h.update(chunk)
              return h.hexdigest()

          def fetch_file(url, dest_path):
              for attempt in range(3):
                  try:
                      req = urllib.request.Request(url, headers={
                          'User-Agent': 'ArchNexus-BuildBot/1.0'
                      })
                      with urllib.request.urlopen(req, timeout=150) as r:
                          with open(dest_path, 'wb') as f:
                              f.write(r.read())
                          return True
                  except Exception:
                      pass
              return False

          def get_github_latest_release(owner, repo):
              url = f"https://api.github.com/repos/{owner}/{repo}/releases/latest"
              req = urllib.request.Request(url, headers={
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'ArchNexus-BuildBot/1.0'
              })
              token = os.environ.get('GH_TOKEN')
              if token:
                  req.add_header('Authorization', f'token {token}')
              try:
                  with urllib.request.urlopen(req, timeout=20) as r:
                      data = json.loads(r.read())
                      return data.get('tag_name', '').lstrip('v')
              except Exception:
                  return None

          def detect_strategy(pkgbuild_text, pkgname):
              if 'installer.rootapp.com' in pkgbuild_text:
                  return 'appimage'
              gh_m = re.search(r'github\.com/([^/]+)/([^/]+)', pkgbuild_text)
              if gh_m:
                  return 'github_release'
              return None

          def check_appimage_version(src_url):
              with tempfile.TemporaryDirectory() as tmp:
                  appimage = os.path.join(tmp, 'AppImage')
                  if not fetch_file(src_url, appimage):
                      return None, None
                  sha = sha256_file(appimage)
                  os.chmod(appimage, 0o755)
                  subprocess.run([appimage, '--appimage-extract'],
                      cwd=tmp, capture_output=True, timeout=300)
                  for f in os.listdir(tmp):
                      d = os.path.join(tmp, f)
                      if os.path.isdir(d):
                          for root, dirs, files in os.walk(d):
                              for fn in files:
                                  if fn.endswith('.desktop'):
                                      fp = os.path.join(root, fn)
                                      with open(fp) as fh:
                                          for line in fh:
                                              m = re.match(r'^X-AppImage-Version=(.+)', line)
                                              if m:
                                                  return m.group(1).strip(), sha
              return None, sha

          def check_github_release_version(owner, repo, pkgbuild_text):
              latest = get_github_latest_release(owner, repo)
              if not latest:
                  return None
              ver_m = re.search(r'^pkgver=["\']?([^"\'\n\s]+)', pkgbuild_text, re.MULTILINE)
              curr_ver = ver_m.group(1) if ver_m else None
              if latest == curr_ver:
                  return None  # No update needed
              return latest

          def parse_shell_var(var_name, text):
              m = re.search(rf'^{var_name}=["\']?([^"\'\n\s]+)', text, re.MULTILINE)
              return m.group(1) if m else None

          def get_distfile_urls(text):
              m = re.search(r'^source(?:_x86_64|_aarch64)?=\((.+?)\)', text, re.MULTILINE | re.DOTALL)
              if not m:
                  return []
              urls = re.findall(r'(https?://[^\s"\'()>]+)', m.group(1))
              # Handle PKGBUILD source syntax: "name::url" or just "url"
              result = []
              for u in urls:
                  if '::' in u:
                      u = u.split('::', 1)[1]
                  result.append(u)
              return result

          def update_pkgbuild(content, new_ver, new_sha):
              c = content
              c = re.sub(r'^pkgver=.*', f'pkgver={new_ver}', c, flags=re.MULTILINE)
              c = re.sub(r'^pkgrel=.*', 'pkgrel=1', c, flags=re.MULTILINE)
              c = re.sub(
                  r'^sha256sums(_[a-zA-Z0-9_]+)?=\([^)]*\)',
                  lambda m: f"sha256sums{m.group(1) or ''}=('{new_sha}')",
                  c, flags=re.MULTILINE
              )
              return c

          def get_aur_version(pkgname):
              url = f"https://aur.archlinux.org/rpc/v5/info?arg[]={pkgname}"
              try:
                  with urllib.request.urlopen(url, timeout=15) as r:
                      data = json.loads(r.read())
                      results = data.get('results', [])
                      if results:
                          ver = results[0].get('Version', '')
                          return ver.rsplit('-', 1)[0]
                  return None
              except Exception:
                  return None

          # ---------- Main ----------
          subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
          subprocess.run(['git', 'config', 'user.email',
                          'github-actions[bot]@users.noreply.github.com'], check=True)

          updated_packages = []
          needs_aur_push = []

          for entry in sorted(os.listdir('.')):
              pkgbuild_path = os.path.join(entry, 'PKGBUILD')
              if not os.path.isdir(entry) or not os.path.isfile(pkgbuild_path):
                  continue

              with open(pkgbuild_path) as f:
                  raw = f.read()

              pkgname = parse_shell_var('pkgname', raw)
              curr_ver = parse_shell_var('pkgver', raw)
              if not pkgname or not curr_ver:
                  continue

              print(f"Scanning {pkgname} (current: {curr_ver})...")
              strategy = detect_strategy(raw, pkgname)
              if not strategy:
                  print(f"  ⤼ No update strategy for {pkgname}, skipping.")
                  # Still check if AUR push needed
                  aur_ver = get_aur_version(pkgname)
                  if aur_ver and aur_ver != curr_ver:
                      needs_aur_push.append(entry)
                      print(f"  → AUR has {aur_ver}, local has {curr_ver} — needs push.")
                  elif not aur_ver:
                      needs_aur_push.append(entry)
                      print(f"  → Not on AUR — needs push.")
                  else:
                      print(f"  → AUR already at {curr_ver}.")
                  continue

              new_ver = None
              new_sha = None

              if strategy == 'appimage':
                  urls = get_distfile_urls(raw)
                  if not urls:
                      print(f"  ⚠ No distfiles found for {pkgname}")
                      continue
                  print(f"  → Checking AppImage: {urls[0]}")
                  nv, ns = check_appimage_version(urls[0])
                  if nv and nv != curr_ver:
                      new_ver, new_sha = nv, ns
                  else:
                      print(f"  → No update (version: {nv})")

              elif strategy == 'github_release':
                  gh_m = re.search(r'github\.com/([^/]+)/([^/]+)', raw)
                  if gh_m:
                      owner, repo = gh_m.group(1), gh_m.group(2)
                      repo = repo.rstrip('.git')
                      print(f"  → Checking GitHub releases: {owner}/{repo}")
                      new_ver = check_github_release_version(owner, repo, raw)
                      if new_ver:
                          urls = get_distfile_urls(raw)
                          if urls:
                              resolved = urls[0].replace(curr_ver, new_ver)
                              with tempfile.NamedTemporaryFile(delete=False) as tmp:
                                  dest = tmp.name
                              if fetch_file(resolved, dest):
                                  new_sha = sha256_file(dest)
                                  os.unlink(dest)
                          if not new_sha:
                              print(f"  ⚠ Could not fetch distfile for {pkgname} @ {new_ver}")
                              continue

              if new_ver and new_sha:
                  new_content = update_pkgbuild(raw, new_ver, new_sha)
                  with open(pkgbuild_path, 'w') as f:
                      f.write(new_content)
                  updated_packages.append(pkgname)
                  needs_aur_push.append(entry)
                  print(f"  ✅ Updated {pkgname}: {curr_ver} → {new_ver}")
              else:
                  print(f"  → Already latest.")
                  # Even if upstream is latest, check if AUR needs sync
                  aur_ver = get_aur_version(pkgname)
                  if aur_ver and aur_ver != curr_ver:
                      needs_aur_push.append(entry)
                      print(f"  → AUR has {aur_ver}, local has {curr_ver} — needs push.")
                  elif not aur_ver:
                      needs_aur_push.append(entry)
                      print(f"  → Not on AUR — needs push.")
                  else:
                      print(f"  → AUR already at {curr_ver}.")

          # Commit and push to GitHub (only if PKGBUILDs changed)
          push_ok = True
          if updated_packages:
              subprocess.run(['git', 'add', '-A'], check=True)
              msg = "chore: auto-update " + ", ".join(updated_packages)
              subprocess.run(['git', 'commit', '-m', msg], check=True)

              def git_push_with_token(tok):
                  if not tok:
                      return False
                  repo_url = subprocess.run(['git', 'remote', 'get-url', 'origin'],
                      capture_output=True, text=True).stdout.strip()
                  authed = repo_url.replace('https://github.com/',
                      f'https://x-access-token:{tok}@github.com/')
                  subprocess.run(['git', 'remote', 'set-url', 'origin', authed], check=True)
                  subprocess.run(['git', 'config', '--unset-all', 'http.https://github.com/.extraheader'],
                      capture_output=True)
                  r = subprocess.run(['git', 'push', 'origin', 'HEAD'],
                      capture_output=True, text=True)
                  return r.returncode == 0

              if not git_push_with_token(os.environ.get('GH_TOKEN', '')):
                  pat = os.environ.get('GH_PAT', '')
                  if pat and pat != os.environ.get('GH_TOKEN', ''):
                      print("  → GITHUB_TOKEN push failed, trying GH_PAT...")
                      if git_push_with_token(pat):
                          push_ok = True
                      else:
                          push_ok = False
                  else:
                      push_ok = False

              if push_ok:
                  print(f"\nCommitted and pushed updates for: {', '.join(updated_packages)}")
              else:
                  print(f"\n⚠ Git push failed — AUR push will still proceed")

          # Write updated packages list for AUR push step (includes AUR sync packages)
          os.makedirs('/tmp/aur-state', exist_ok=True)
          with open('/tmp/aur-state/updated.txt', 'w') as f:
              for pkg in needs_aur_push:
                  f.write(pkg + '\n')
          found = 'true' if needs_aur_push else 'false'
          with open(os.environ.get('GITHUB_OUTPUT', '/dev/null'), 'a') as f:
              f.write(f"updates_found={found}\n")
          if needs_aur_push:
              print(f"\nPackages to push to AUR: {', '.join(needs_aur_push)}")
          else:
              print("\nNo packages need AUR push.")
          PYEOF

      - name: Push updates to AUR
        if: steps.scan.outputs.updates_found == 'true'
        shell: /usr/bin/bash -e {0}
        run: |
          set -x
          echo "=== AUR push step started ==="
          echo "Contents of state file:"
          cat /tmp/aur-state/updated.txt 2>&1 || echo "(file missing)"
          echo "=== End state file ==="
          while IFS= read -r PKG; do
            [ -z "$PKG" ] && continue
            echo "Processing package: $PKG"
            PKGBUILD_DIR="$(pwd)/${PKG}"
            AUR_PKGNAME=$(grep '^pkgname=' "${PKGBUILD_DIR}/PKGBUILD" \
              | sed 's/^pkgname=//' | tr -d "'\"")
            AUR_VER=$(grep '^pkgver=' "${PKGBUILD_DIR}/PKGBUILD" \
              | sed 's/^pkgver=//' | tr -d "'\"")
            echo "Package name: $AUR_PKGNAME, version: $AUR_VER"
            
            # Check current version on AUR
            AUR_LATEST=$(curl -s "https://aur.archlinux.org/rpc/v5/info?arg%5B%5D=${AUR_PKGNAME}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('results',[]); print(r[0]['Version'].rsplit('-',1)[0] if r else '')" 2>/dev/null || echo "")
            echo "AUR latest: '$AUR_LATEST'"
            
            if [ "$AUR_LATEST" = "$AUR_VER" ]; then
              echo "→ ${AUR_PKGNAME}: version ${AUR_VER} already on AUR, skipping."
              continue
            fi
            
            if [ -n "$AUR_LATEST" ]; then
              echo "→ ${AUR_PKGNAME}: AUR has ${AUR_LATEST}, pushing ${AUR_VER}..."
            else
              echo "→ ${AUR_PKGNAME}: not found on AUR, pushing ${AUR_VER}..."
            fi
            
            # Clone AUR repo
            WORKDIR=$(mktemp -d)
            echo "Cloning AUR repo into $WORKDIR..."
            git clone "ssh://aur@aur.archlinux.org/${AUR_PKGNAME}.git" "$WORKDIR" 2>&1
            echo "Clone done."
            
            # Copy updated files
            cp "${PKGBUILD_DIR}/PKGBUILD" "$WORKDIR/"
            for f in "${PKGBUILD_DIR}"/*; do
              [ -f "$f" ] && cp "$f" "$WORKDIR/"
            done
            
            # Commit and push to AUR
            cd "$WORKDIR"
            git config user.name "${{ secrets.AUR_USERNAME }}"
            git config user.email "${{ secrets.AUR_EMAIL }}"
            git add -A
            git commit -m "Update to ${AUR_VER}" 2>&1
            echo "Pushing to AUR..."
            git push origin HEAD 2>&1
            echo "Push done."
            
            rm -rf "$WORKDIR"
            echo "  ✓ ${AUR_PKGNAME} pushed to AUR"
          done < /tmp/aur-state/updated.txt
          echo "=== AUR push step finished ==="
