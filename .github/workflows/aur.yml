name: Check and Update AUR Package

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download AppImage
        run: |
          curl -sL -o /tmp/Root.AppImage \
            "https://installer.rootapp.com/installer/Linux/X64/Root.AppImage"
          echo "SHA256=$(sha256sum /tmp/Root.AppImage | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Extract version from AppImage
        run: |
          chmod +x /tmp/Root.AppImage
          /tmp/Root.AppImage --appimage-extract > /dev/null 2>&1
          VERSION=$(grep '^X-AppImage-Version' squashfs-root/*.desktop \
            | head -1 | sed 's/^X-AppImage-Version=//' | tr -d '\r')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Check if update needed
        id: check
        run: |
          CURRENT=$(grep '^pkgver=' rootapp/PKGBUILD \
            | sed 's/^pkgver=//' | tr -d "'\"")
          echo "Current: $CURRENT, Latest: $VERSION"
          if [ -z "$VERSION" ]; then
            echo "update_needed=false" >> $GITHUB_OUTPUT
          elif [ "$VERSION" != "$CURRENT" ]; then
            echo "update_needed=true" >> $GITHUB_OUTPUT
          else
            echo "update_needed=false" >> $GITHUB_OUTPUT
          fi

      - name: Update PKGBUILD
        if: steps.check.outputs.update_needed == 'true'
        run: |
          sed -i "s/^pkgver=.*/pkgver=$VERSION/" rootapp/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" rootapp/PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('$SHA256')/" rootapp/PKGBUILD

      - name: Commit to GitHub
        if: steps.check.outputs.update_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rootapp/PKGBUILD
          git commit -m "rootapp-bin: update to $VERSION"
          git push

      - name: Push to AUR
        if: steps.check.outputs.update_needed == 'true'
        uses: KSXGitHub/github-actions-deploy-aur@v4.1.3
        with:
          pkgname: rootapp-bin
          pkgbuild: ./rootapp/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: Update to ${{ env.VERSION }}
          updpkgsums: false
          test: false
